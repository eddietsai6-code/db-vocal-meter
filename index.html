<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A minimal browser dB meter for a cappella vocal practice."
    />
    <title>DB Vocal Meter</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Ctext x='16' y='22' fill='white' font-size='15' font-family='Arial' text-anchor='middle'%3EdB%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="meter-app" aria-labelledby="appTitle">
      <h1 class="sr-only" id="appTitle">DB Vocal Meter</h1>

      <section class="readout" aria-live="polite">
        <div class="current-line">
          <strong class="current-value" id="currentValue">--</strong>
          <span class="unit">dB</span>
        </div>
        <p class="status-text" id="statusText">READY</p>
      </section>

      <section class="stats" aria-label="Session volume statistics">
        <div class="stat">
          <span class="stat-label">min</span>
          <strong class="stat-value" id="minValue">--</strong>
        </div>
        <div class="stat">
          <span class="stat-label">mean</span>
          <strong class="stat-value" id="meanValue">--</strong>
        </div>
        <div class="stat">
          <span class="stat-label">max</span>
          <strong class="stat-value" id="maxValue">--</strong>
        </div>
      </section>

      <nav class="controls" aria-label="Meter controls">
        <button
          class="icon-button"
          id="resetButton"
          type="button"
          aria-label="Reset session"
          title="Reset"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 4v6h6" />
            <path d="M20 20v-6h-6" />
            <path d="M20 9a8 8 0 0 0-13.5-3.5L4 8" />
            <path d="M4 15a8 8 0 0 0 13.5 3.5L20 16" />
          </svg>
        </button>

        <button
          class="icon-button primary"
          id="micButton"
          type="button"
          aria-label="Start microphone"
          aria-pressed="false"
          title="Microphone"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3Z" />
            <path d="M19 11a7 7 0 0 1-14 0" />
            <path d="M12 18v3" />
            <path d="M8 21h8" />
          </svg>
        </button>

        <button
          class="icon-button"
          id="settingsButton"
          type="button"
          aria-label="Open settings"
          title="Settings"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.67 4.14a2.34 2.34 0 0 1 4.66 0 2.34 2.34 0 0 0 3.32 1.91 2.34 2.34 0 0 1 2.33 4.03 2.34 2.34 0 0 0 0 3.84 2.34 2.34 0 0 1-2.33 4.03 2.34 2.34 0 0 0-3.32 1.91 2.34 2.34 0 0 1-4.66 0 2.34 2.34 0 0 0-3.32-1.91 2.34 2.34 0 0 1-2.33-4.03 2.34 2.34 0 0 0 0-3.84 2.34 2.34 0 0 1 2.33-4.03 2.34 2.34 0 0 0 3.32-1.91Z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </nav>
    </main>

    <dialog class="settings-dialog" id="settingsDialog">
      <form class="settings-panel" method="dialog">
        <h2>Settings</h2>
        <label>
          Calibration offset
          <input
            id="offsetInput"
            type="number"
            inputmode="decimal"
            min="20"
            max="140"
            step="1"
          />
        </label>
        <label>
          Machine dB
          <input
            id="referenceInput"
            type="number"
            inputmode="decimal"
            min="20"
            max="120"
            step="1"
          />
        </label>
        <label>
          Smoothing
          <input
            id="smoothingInput"
            type="range"
            min="0.06"
            max="0.3"
            step="0.02"
          />
        </label>
        <div class="settings-actions">
          <button class="text-button secondary" id="calibrateButton" type="button">
            Match
          </button>
          <button class="text-button" id="closeSettingsButton" type="submit">
            Done
          </button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./assets/app.js"></script>
  </body>
</html>
